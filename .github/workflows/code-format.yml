name: Code Format Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev --locked
      - name: ruff format + check
        run: make check-py

  web:
    name: Web (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24.15.0'
          package-manager-cache: false
      - name: Install root toolchain
        run: corepack npm ci
      - name: Install dashboard deps
        working-directory: dashboard
        run: corepack pnpm install --frozen-lockfile
      - name: typecheck + eslint + prettier
        run: make check-web

  data:
    name: Data (json/css/html/toml/yaml/markdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - uses: actions/setup-node@v7
        with:
          node-version: '24.15.0'
          package-manager-cache: false
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --group dev --locked
      - name: Install root toolchain
        run: corepack npm ci
      - name: Check json/css/html
        run: make check-data
      - name: Check toml
        run: make check-toml
      - name: Check yaml
        run: make check-yaml
      - name: Check markdown
        run: make check-md

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck + shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64" \
            -o /usr/local/bin/shfmt
          sudo chmod +x /usr/local/bin/shfmt
      - name: shfmt + shellcheck
        run: make check-shell

  docker:
    name: Dockerfile (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

  powershell:
    name: PowerShell (PSScriptAnalyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
      - name: Invoke-ScriptAnalyzer
        shell: pwsh
        run: ./scripts/lint_powershell.ps1
