# Taplo (TOML) formatting + lint configuration.
include = ["**/*.toml"]
exclude = ["**/node_modules/**", ".venv*/**"]

[formatting]
align_entries = false
align_comments = true
array_trailing_comma = true
array_auto_expand = true
array_auto_collapse = true
compact_arrays = true
compact_inline_tables = false
indent_tables = false
indent_entries = false
indent_string = "  "
trailing_newline = true
# Preserve the hand-curated key ordering in pyproject.toml.
reorder_keys = false
reorder_arrays = false

[[rule]]
keys = ["dependencies", "dependency-groups"]
formatting = { reorder_arrays = false }
