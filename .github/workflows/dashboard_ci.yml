name: AstrBot Dashboard CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'AstrBotDevs/AstrBot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24.15.0'
          cache: 'pnpm'
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install and Build
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Inject Commit SHA
        id: get_sha
        run: |
          echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV
          mkdir -p dashboard/dist/assets
          echo $COMMIT_SHA > dashboard/dist/assets/version
          cd dashboard
          zip -r dist.zip dist

      - name: Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-without-markdown
          path: |
            dashboard/dist
            !dist/**/*.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: release-${{ github.sha }}
          owner: AstrBotDevs
          repo: astrbot-release-harbour
          body: 'Automated release from commit ${{ github.sha }}'
          token: ${{ secrets.ASTRBOT_HARBOUR_TOKEN }}
          artifacts: 'dashboard/dist.zip'
